<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#12141c">
    <meta name="description" content="Mission Runner - Tactical Planetary Operations Command Panel">
    <title>Mission Runner</title>
    
    <!-- Material Design Icons and Symbols (Google Web Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <!-- Unified CSS Sheets -->
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <!-- App Shell Root mounting element -->
    <div id="app-shell-root">
        <!-- Loader during system assets parsing -->
        <div class="system-splash-screen">
            <div class="splash-spinner-wrap">
                <div class="splash-spinner"></div>
            </div>
            <h2 class="splash-title">MISSION RUNNER</h2>
            <p class="splash-subtitle">Synchronizing tactical log channels...</p>
        </div>
    </div>

    <!-- Modular JS App Bootstrap -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
