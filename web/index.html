<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c10">
    <title>Mission Runner</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --bg-primary: #07090e;
            --bg-secondary: #0c0f16;
            --bg-surface: #121622;
            --border-color: #242c42;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #4e5d78;
            --color-accent: #3d8bff;
            --color-accent-hover: #2563eb;
            --color-accent-alpha: rgba(61,139,255,0.12);
            --color-success: #10b981;
            --color-success-alpha: rgba(16,185,129,0.1);
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.6);
            --sidebar-width: 220px;
            --topbar-height: 56px;
        }

        .theme-light {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-surface: #ffffff;
            --border-color: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --color-accent: #2563eb;
            --color-accent-hover: #1d4ed8;
            --color-accent-alpha: rgba(37,99,235,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 14px; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300; display: inline-block; vertical-align: middle; user-select: none; }
        button, input, textarea { font-family: inherit; font-size: inherit; color: inherit; outline: none; }
        .monospace { font-family: 'JetBrains Mono', monospace; }

        .shell { display: grid; grid-template-columns: var(--sidebar-width) 1fr; grid-template-rows: var(--topbar-height) 1fr; width: 100vw; height: 100vh; overflow: hidden; }
        .sidebar { grid-column: 1; grid-row: 1/3; background: var(--bg-secondary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { height: var(--topbar-height); display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border-color); gap: 10px; }
        .sidebar-logo { font-size: 24px; color: var(--color-accent); }
        .sidebar-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; background: linear-gradient(135deg, var(--text-primary), var(--color-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-nav { flex: 1; padding: 8px 12px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
        .nav-link { height: 38px; display: flex; align-items: center; padding: 0 12px; border-radius: 6px; color: var(--text-secondary); gap: 12px; cursor: pointer; transition: 0.15s; }
        .nav-link:hover { background: var(--color-accent-alpha); color: var(--text-primary); }
        .nav-link.active { background: var(--color-accent); color: #fff; font-weight: 500; }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .theme-btn { width: 32px; height: 32px; border-radius: 6px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .theme-btn:hover { background: var(--color-accent-alpha); color: var(--text-primary); }

        .topbar { grid-column: 2; grid-row: 1; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .system-badge { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; background: var(--bg-surface); border: 1px solid var(--border-color); font-size: 0.7rem; font-weight: 700; }
        .blink { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); animation: pulse 2s infinite; }
        .clock { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 700; color: var(--color-accent); background: var(--color-accent-alpha); padding: 4px 12px; border-radius: 4px; }

        .workspace { grid-column: 2; grid-row: 2; background: var(--bg-primary); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .screen { display: none; flex-direction: column; gap: 16px; }
        .screen.active { display: flex; }

        .mission-prompt textarea { width: 100%; height: 150px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; resize: vertical; }
        .mission-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { height: 36px; border-radius: 6px; border: none; display: inline-flex; align-items: center; gap: 6px; padding: 0 14px; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: 0.15s; }
        .btn-primary { background: var(--color-accent); color: #fff; }
        .btn-primary:hover { background: var(--color-accent-hover); }
        .btn-success { background: var(--color-success); color: #fff; }
        .btn-success:hover { background: #0d9e6e; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .btn-outline:hover { background: var(--color-accent-alpha); border-color: var(--color-accent); }
        .btn-danger { background: var(--color-danger); color: #fff; }
        .btn-danger:hover { background: #d32f2f; }
        .status-badge { font-size: 0.75rem; padding: 4px 12px; border-radius: 12px; background: var(--bg-surface); border: 1px solid var(--border-color); margin-left: auto; }

        .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; min-height: 180px; }
        .panel { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; overflow-y: auto; max-height: 220px; }
        .panel-title { font-weight: 600; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; }
        .queue-item { display: flex; justify-content: space-between; padding: 4px 6px; border-bottom: 1px solid var(--border-color); font-size: 0.78rem; font-family: 'JetBrains Mono', monospace; }
        .q-status { font-size: 0.65rem; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
        .q-waiting { background: var(--color-warning); color: #000; }
        .q-running { background: var(--color-accent); color: #fff; }
        .q-completed { background: var(--color-success); color: #fff; }
        .q-failed { background: var(--color-danger); color: #fff; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.7rem; }
        .log-success { color: var(--color-success); }
        .log-warning { color: var(--color-warning); }
        .log-error { color: var(--color-danger); }
        .log-info { color: var(--text-secondary); }

        .file-list { display: flex; flex-direction: column; gap: 2px; }
        .file-row { padding: 4px 10px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
        .file-row:hover { background: var(--color-accent-alpha); }
        .file-row.active { background: var(--color-accent-alpha); color: var(--color-accent); }
        .file-editor textarea { width: 100%; height: 200px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; resize: vertical; }

        .toast-container { position: fixed; bottom: 30px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; width: 300px; pointer-events: none; }
        .toast { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 14px; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 10px; pointer-events: auto; animation: slideUp 0.2s ease; }
        .toast.exit { transform: translateY(-10px); opacity: 0; transition: 0.2s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
        @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; opacity: 0; pointer-events: none; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; width: 100%; max-width: 450px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; transform: scale(0.95); transition: 0.2s; }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { padding: 18px; }
        .modal-foot { padding: 12px 18px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); display: flex; justify-content: flex-end; gap: 10px; }

        @media (max-width: 768px) {
            .shell { grid-template-columns: 1fr; }
            .sidebar { position: fixed; inset: 0; width: 260px !important; transform: translateX(-100%); transition: 0.2s; z-index: 100; }
            .sidebar.open { transform: translateX(0); }
            .topbar { grid-column: 1; }
            .workspace { grid-column: 1; }
            .panels { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="shell" id="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="material-symbols-outlined sidebar-logo">explore</span>
            <span class="sidebar-title">MISSION</span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-link active" data-screen="mission">🚀 Mission</div>
            <div class="nav-link" data-screen="files">📁 Files</div>
        </nav>
        <div class="sidebar-footer">
            <span style="font-size:0.65rem;color:var(--text-muted)">v2.0</span>
            <button class="theme-btn" id="themeToggle">🌓</button>
        </div>
    </aside>

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="topbar-left">
            <span class="system-badge"><span class="blink"></span> ONLINE</span>
            <span id="repoName" style="font-weight:600;font-size:0.85rem;">Default</span>
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <!-- WORKSPACE -->
    <main class="workspace">
        <!-- MISSION SCREEN -->
        <div class="screen active" id="screen-mission">
            <div>
                <h2 style="font-size:1.4rem;">🚀 Mission Center</h2>
                <p style="color:var(--text-secondary);font-size:0.85rem;">Write commands, parse, execute.</p>
            </div>
            <div class="mission-prompt">
                <textarea id="promptInput" placeholder="CREATE: hello.txt&#10;Hello World&#10;END"></textarea>
                <div class="mission-actions">
                    <button class="btn btn-primary" id="btnParse">Parse</button>
                    <button class="btn btn-success" id="btnExecute">Execute</button>
                    <button class="btn btn-outline" id="btnClear">Clear</button>
                    <span class="status-badge" id="statusBadge">Idle</span>
                </div>
            </div>
            <div class="panels">
                <div class="panel">
                    <div class="panel-title">Queue</div>
                    <div id="queueList"><div style="color:var(--text-muted);text-align:center;padding:16px;">Empty</div></div>
                </div>
                <div class="panel">
                    <div class="panel-title">Log</div>
                    <div id="logList"><div style="color:var(--text-muted);text-align:center;padding:16px;">Ready</div></div>
                </div>
            </div>
        </div>

        <!-- FILES SCREEN -->
        <div class="screen" id="screen-files">
            <div>
                <h2 style="font-size:1.4rem;">📁 Files</h2>
                <p style="color:var(--text-secondary);font-size:0.85rem;">Create, edit, delete virtual files.</p>
            </div>
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:16px;height:100%;min-height:300px;">
                <div class="panel" style="max-height:none;overflow-y:auto;">
                    <div class="panel-title">Files</div>
                    <div id="fileTree" class="file-list"><div style="color:var(--text-muted);text-align:center;padding:16px;">No files</div></div>
                    <button class="btn btn-primary" id="btnNewFile" style="margin-top:8px;width:100%;">+ New File</button>
                </div>
                <div class="panel" style="max-height:none;display:flex;flex-direction:column;">
                    <div class="panel-title" id="activeFileName">Select a file</div>
                    <div class="file-editor" style="flex:1;">
                        <textarea id="fileEditor" placeholder="File content..." style="height:100%;"></textarea>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:8px;">
                        <button class="btn btn-success" id="btnSaveFile">Save</button>
                        <button class="btn btn-danger" id="btnDeleteFile">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastDock"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-head">
            <h3 id="modalTitle">Action</h3>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot">
            <button class="btn btn-outline" id="modalCancel">Cancel</button>
            <button class="btn btn-primary" id="modalConfirm">Confirm</button>
        </div>
    </div>
</div>

<script type="module">
// ============================================================
// CORE — Minimal, self-contained
// ============================================================

// --- Storage ---
const storage = {
    get(k, d=null) { try { const v=localStorage.getItem('mr_'+k); return v?JSON.parse(v):d; } catch { return d; } },
    set(k,v) { localStorage.setItem('mr_'+k, JSON.stringify(v)); },
    clear() { Object.keys(localStorage).filter(k=>k.startsWith('mr_')).forEach(k=>localStorage.removeItem(k)); }
};

// --- State ---
const defaultFiles = [
    { path: 'README.md', content: '# Mission Runner\n\nWrite commands in Mission Center.' },
    { path: 'src/index.js', content: 'console.log("Hello from Mission Runner");' }
];
const state = {
    files: storage.get('files', defaultFiles),
    activePath: storage.get('activePath', defaultFiles[0]?.path || ''),
    queue: [],
    status: 'idle'
};

function saveState() {
    storage.set('files', state.files);
    storage.set('activePath', state.activePath);
}

function getFile(path) { return state.files.find(f => f.path === path); }
function getActiveFile() { return getFile(state.activePath); }

// --- Notifications ---
function toast(msg, type='info') {
    const dock = document.getElementById('toastDock');
    if (!dock) return;
    const el = document.createElement('div');
    el.className = 'toast';
    const icons = { success:'✅', warning:'⚠️', error:'❌', info:'ℹ️' };
    el.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
    dock.appendChild(el);
    setTimeout(() => el.classList.add('exit'), 3000);
    setTimeout(() => el.remove(), 3500);
}

// --- Modal ---
function showModal(title, bodyHTML, onConfirm) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = bodyHTML;
    document.getElementById('modalOverlay').classList.add('active');
    const confirm = document.getElementById('modalConfirm');
    const newConfirm = confirm.cloneNode(true);
    confirm.parentNode.replaceChild(newConfirm, confirm);
    newConfirm.addEventListener('click', () => { closeModal(); if (onConfirm) onConfirm(); });
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });

// --- Theme ---
function setTheme(t) {
    document.documentElement.classList.toggle('theme-light', t === 'light');
    storage.set('theme', t);
}
const savedTheme = storage.get('theme', 'dark');
setTheme(savedTheme);
document.getElementById('themeToggle').addEventListener('click', () => {
    const isLight = document.documentElement.classList.contains('theme-light');
    setTheme(isLight ? 'dark' : 'light');
});

// --- Clock ---
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toISOString().replace('T',' ').slice(0,19);
}
updateClock();
setInterval(updateClock, 1000);

// --- Navigation ---
document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-'+link.dataset.screen).classList.add('active');
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    });
});
document.querySelector('.sidebar-header')?.addEventListener('click', () => {
    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.toggle('open');
});

// ============================================================
// VIRTUAL FILE SYSTEM
// ============================================================
function createFile(path, content='') {
    if (state.files.some(f => f.path === path)) { toast('File exists', 'warning'); return false; }
    state.files.push({ path, content });
    saveState();
    renderFiles();
    return true;
}
function writeFile(path, content) {
    const f = getFile(path);
    if (!f) { toast('File not found', 'error'); return false; }
    f.content = content;
    saveState();
    return true;
}
function deleteFile(path) {
    state.files = state.files.filter(f => f.path !== path);
    if (state.activePath === path) state.activePath = state.files[0]?.path || '';
    saveState();
    renderFiles();
    renderEditor();
    return true;
}
function renameFile(oldPath, newPath) {
    const f = getFile(oldPath);
    if (!f) { toast('File not found', 'error'); return false; }
    if (state.files.some(f => f.path === newPath)) { toast('Target exists', 'warning'); return false; }
    f.path = newPath;
    if (state.activePath === oldPath) state.activePath = newPath;
    saveState();
    renderFiles();
    renderEditor();
    return true;
}

// ============================================================
// COMMAND PARSER & EXECUTOR
// ============================================================
function parseCommands(text) {
    const lines = text.split('\n');
    const ops = [];
    let current = null;
    let mode = null;

    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        // Single-line commands
        const match = line.match(/^(CREATE|EDIT|DELETE|RENAME|COMMIT|WAIT|COMMENT):\s*(.*)/);
        if (match) {
            if (current) { ops.push(current); current = null; mode = null; }
            const [, cmd, arg] = match;
            const op = { command: cmd, args: {}, line: i+1 };
            if (cmd === 'CREATE' || cmd === 'EDIT') op.args.path = arg;
            else if (cmd === 'DELETE') op.args.path = arg;
            else if (cmd === 'RENAME') {
                const parts = arg.split('->').map(p => p.trim());
                op.args.from = parts[0] || '';
                op.args.to = parts[1] || '';
            }
            else if (cmd === 'COMMIT') op.args.message = arg;
            else if (cmd === 'WAIT') op.args.delay = parseInt(arg) || 1000;
            else if (cmd === 'COMMENT') op.args.message = arg;
            ops.push(op);
            continue;
        }

        // Multi-line: CREATE/EDIT with content
        if (line === 'END') {
            if (current) { ops.push(current); current = null; mode = null; }
            continue;
        }
        if (line.startsWith('CREATE:') || line.startsWith('EDIT:')) {
            if (current) ops.push(current);
            const cmd = line.startsWith('CREATE:') ? 'CREATE' : 'EDIT';
            const path = line.replace(/^(CREATE|EDIT):\s*/, '').trim();
            current = { command: cmd, args: { path, content: [] }, line: i+1 };
            mode = 'content';
            continue;
        }
        if (mode === 'content' && current) {
            current.args.content.push(line);
        }

        // REPLACE with TARGET/REPLACEMENT
        if (line.startsWith('REPLACE:')) {
            if (current) ops.push(current);
            const path = line.replace('REPLACE:', '').trim();
            current = { command: 'REPLACE', args: { path, target: [], replacement: [] }, line: i+1 };
            mode = 'replace_target';
            continue;
        }
        if (mode === 'replace_target' && line === 'REPLACEMENT:') {
            mode = 'replace_replacement';
            continue;
        }
        if (mode === 'replace_target' && current) {
            current.args.target.push(line);
        }
        if (mode === 'replace_replacement' && current) {
            current.args.replacement.push(line);
        }
    }

    // Post-process
    ops.forEach(op => {
        if (op.command === 'CREATE' || op.command === 'EDIT') {
            if (op.args.content && Array.isArray(op.args.content)) {
                op.args.content = op.args.content.join('\n');
            }
        }
        if (op.command === 'REPLACE') {
            if (op.args.target && Array.isArray(op.args.target)) {
                op.args.target = op.args.target.join('\n');
            }
            if (op.args.replacement && Array.isArray(op.args.replacement)) {
                op.args.replacement = op.args.replacement.join('\n');
            }
        }
    });

    return ops;
}

async function executeOp(op) {
    const repo = state; // alias
    switch (op.command) {
        case 'CREATE':
        case 'EDIT':
            return createFile(op.args.path, op.args.content || '');
        case 'DELETE':
            return deleteFile(op.args.path);
        case 'RENAME':
            return renameFile(op.args.from, op.args.to);
        case 'REPLACE': {
            const f = getFile(op.args.path);
            if (!f) { toast(`File "${op.args.path}" not found`, 'error'); return false; }
            if (!f.content.includes(op.args.target)) {
                toast(`Target not found in "${op.args.path}"`, 'warning');
                return false;
            }
            f.content = f.content.replace(op.args.target, op.args.replacement);
            saveState();
            renderFiles();
            renderEditor();
            return true;
        }
        case 'COMMIT':
            toast(`Committed: ${op.args.message || 'update'}`, 'success');
            return true;
        case 'WAIT':
            await new Promise(r => setTimeout(r, op.args.delay || 1000));
            return true;
        case 'COMMENT':
            return true;
        default:
            toast(`Unknown command: ${op.command}`, 'warning');
            return false;
    }
}

// ============================================================
// UI RENDERERS
// ============================================================
function renderFiles() {
    const container = document.getElementById('fileTree');
    if (!state.files.length) {
        container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:16px;">No files</div>';
        return;
    }
    container.innerHTML = state.files.map(f =>
        `<div class="file-row ${f.path === state.activePath ? 'active' : ''}" data-path="${f.path}">
            <span class="material-symbols-outlined" style="font-size:18px;">description</span>
            <span>${f.path}</span>
        </div>`
    ).join('');
    container.querySelectorAll('.file-row').forEach(row => {
        row.addEventListener('click', () => {
            state.activePath = row.dataset.path;
            saveState();
            renderFiles();
            renderEditor();
        });
    });
    renderEditor();
}

function renderEditor() {
    const f = getActiveFile();
    const ta = document.getElementById('fileEditor');
    const label = document.getElementById('activeFileName');
    if (!f) {
        ta.value = '';
        ta.disabled = true;
        label.textContent = 'No file selected';
        return;
    }
    ta.value = f.content;
    ta.disabled = false;
    label.textContent = f.path;
}

function renderQueue() {
    const container = document.getElementById('queueList');
    if (!state.queue.length) {
        container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:16px;">Empty</div>';
        return;
    }
    container.innerHTML = state.queue.map((op, i) =>
        `<div class="queue-item">
            <span>#${i+1} ${op.command} ${op.args.path || op.args.name || ''}</span>
            <span class="q-status q-${op.status || 'waiting'}">${op.status || 'waiting'}</span>
        </div>`
    ).join('');
}

function addLog(msg, type='info') {
    const container = document.getElementById('logList');
    if (container.querySelector('.empty-state')) container.innerHTML = '';
    const el = document.createElement('div');
    el.className = `log-entry log-${type}`;
    el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
}

function setStatus(text) {
    document.getElementById('statusBadge').textContent = text;
    state.status = text;
}

// ============================================================
// MISSION EXECUTION ENGINE
// ============================================================
let running = false;
let cancelRequested = false;

async function runMission() {
    if (running) { toast('Already running', 'warning'); return; }
    if (!state.queue.length) { toast('Queue empty. Parse first.', 'warning'); return; }

    running = true;
    cancelRequested = false;
    setStatus('Running');

    for (let i = 0; i < state.queue.length; i++) {
        if (cancelRequested) {
            setStatus('Cancelled');
            toast('Mission cancelled', 'warning');
            running = false;
            return;
        }
        const op = state.queue[i];
        op.status = 'running';
        renderQueue();
        addLog(`▶ ${op.command} ${op.args.path || ''}`, 'info');

        try {
            const ok = await executeOp(op);
            op.status = ok ? 'completed' : 'failed';
            if (ok) {
                addLog(`✓ ${op.command} success`, 'success');
            } else {
                addLog(`✗ ${op.command} failed`, 'error');
                setStatus('Error');
                running = false;
                renderQueue();
                return;
            }
        } catch (e) {
            op.status = 'failed';
            addLog(`✗ ${op.command} error: ${e.message}`, 'error');
            setStatus('Error');
            running = false;
            renderQueue();
            return;
        }
        renderQueue();
    }

    setStatus('Done');
    toast('Mission complete', 'success');
    running = false;
}

// ============================================================
// EVENT BINDINGS
// ============================================================
document.getElementById('btnParse').addEventListener('click', () => {
    const text = document.getElementById('promptInput').value;
    if (!text.trim()) { toast('Enter commands', 'warning'); return; }
    const ops = parseCommands(text);
    state.queue = ops.map(op => ({ ...op, status: 'waiting' }));
    renderQueue();
    addLog(`Parsed ${ops.length} commands`, 'info');
    setStatus(ops.length ? 'Parsed' : 'Idle');
    if (ops.length) toast(`Parsed ${ops.length} commands`, 'success');
});

document.getElementById('btnExecute').addEventListener('click', runMission);

document.getElementById('btnClear').addEventListener('click', () => {
    document.getElementById('promptInput').value = '';
    state.queue = [];
    renderQueue();
    setStatus('Idle');
    addLog('Cleared', 'info');
});

document.getElementById('btnSaveFile').addEventListener('click', () => {
    const f = getActiveFile();
    if (!f) { toast('No file open', 'warning'); return; }
    const content = document.getElementById('fileEditor').value;
    f.content = content;
    saveState();
    toast('Saved', 'success');
});

document.getElementById('btnDeleteFile').addEventListener('click', () => {
    const f = getActiveFile();
    if (!f) { toast('No file open', 'warning'); return; }
    showModal('Delete File', `<p>Delete <strong>${f.path}</strong>?</p>`, () => {
        deleteFile(f.path);
        toast('Deleted', 'success');
    });
});

document.getElementById('btnNewFile').addEventListener('click', () => {
    showModal('New File', `
        <label style="display:block;font-weight:600;margin-bottom:4px;">Path</label>
        <input type="text" id="newFilePath" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-primary);color:var(--text-primary);" placeholder="src/new.js">
    `, () => {
        const path = document.getElementById('newFilePath').value.trim();
        if (!path) { toast('Enter a path', 'warning'); return; }
        if (createFile(path, '')) {
            state.activePath = path;
            saveState();
            renderFiles();
            renderEditor();
            toast(`Created ${path}`, 'success');
        }
    });
});

// Keyboard shortcut: Ctrl+S save file
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        const f = getActiveFile();
        if (f && document.activeElement?.id === 'fileEditor') {
            e.preventDefault();
            document.getElementById('btnSaveFile').click();
        }
    }
});

// ============================================================
// BOOT
// ============================================================
function boot() {
    renderFiles();
    renderQueue();
    addLog('System ready', 'info');

    // Auto-load sample prompt
    const sample = `CREATE: hello.txt
Hello from Mission Runner

CREATE: notes.md
# Notes
- First item

END`;
    document.getElementById('promptInput').value = sample;
}

// Handle mobile sidebar toggle
document.querySelector('.topbar-left')?.addEventListener('click', () => {
    if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.toggle('open');
    }
});

boot();
toast('Mission Runner ready', 'success');

// Expose for debugging
window.__state = state;
</script>
