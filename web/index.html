<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mission Runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-primary: #07090e;
            --bg-secondary: #0c0f16;
            --bg-surface: #121622;
            --bg-surface-elevated: #1a1f30;
            --border-color: #242c42;
            --border-focus: #3d8bff;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #4e5d78;
            --color-accent: #3d8bff;
            --color-accent-hover: #2563eb;
            --color-accent-alpha: rgba(61,139,255,0.12);
            --color-accent-bright: #60a5fa;
            --color-success: #10b981;
            --color-success-alpha: rgba(16,185,129,0.1);
            --color-warning: #f59e0b;
            --color-warning-alpha: rgba(245,158,11,0.1);
            --color-danger: #ef4444;
            --color-danger-alpha: rgba(239,68,68,0.1);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.6);
            --sidebar-width: 240px;
            --topbar-height: 56px;
            --statusbar-height: 28px;
        }
        .theme-light {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-surface: #ffffff;
            --bg-surface-elevated: #f8fafc;
            --border-color: #cbd5e1;
            --border-focus: #2563eb;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --color-accent: #2563eb;
            --color-accent-hover: #1d4ed8;
            --color-accent-alpha: rgba(37,99,235,0.08);
            --color-accent-bright: #3b82f6;
            --color-success: #16a34a;
            --color-success-alpha: rgba(22,163,74,0.08);
            --color-warning: #d97706;
            --color-warning-alpha: rgba(217,119,6,0.08);
            --color-danger: #dc2626;
            --color-danger-alpha: rgba(220,38,38,0.08);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300; display: inline-block; vertical-align: middle; user-select: none; }
        button, input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; outline: none; }
        .monospace { font-family: 'JetBrains Mono', monospace; }

        /* SHELL */
        .shell { display: grid; grid-template-columns: var(--sidebar-width) 1fr; grid-template-rows: var(--topbar-height) 1fr var(--statusbar-height); width: 100vw; height: 100vh; overflow: hidden; }
        .sidebar { grid-column: 1; grid-row: 1/4; background: var(--bg-secondary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; z-index: 100; }
        .sidebar-header { height: var(--topbar-height); display: flex; align-items: center; padding: 0 14px; border-bottom: 1px solid var(--border-color); gap: 10px; }
        .sidebar-logo { font-size: 24px; color: var(--color-accent); }
        .sidebar-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; background: linear-gradient(135deg, var(--text-primary), var(--color-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-repo { padding: 8px 14px; border-bottom: 1px solid var(--border-color); }
        .repo-select { width: 100%; height: 32px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-surface); padding: 0 8px; font-size: 0.8rem; cursor: pointer; color: var(--text-primary); }
        .sidebar-nav { flex: 1; padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
        .nav-link { height: 38px; display: flex; align-items: center; padding: 0 12px; border-radius: 6px; color: var(--text-secondary); gap: 12px; cursor: pointer; transition: 0.15s; font-size: 0.85rem; }
        .nav-link:hover { background: var(--color-accent-alpha); color: var(--text-primary); }
        .nav-link.active { background: var(--color-accent); color: #fff; font-weight: 500; }
        .sidebar-footer { padding: 8px 14px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .theme-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 18px; padding: 4px; }
        .theme-btn:hover { color: var(--text-primary); }

        .topbar { grid-column: 2; grid-row: 1; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .menu-toggle { display: none; background: none; border: 1px solid var(--border-color); border-radius: 6px; padding: 4px 8px; color: var(--text-primary); cursor: pointer; }
        .system-badge { display: flex; align-items: center; gap: 6px; padding: 2px 10px; border-radius: 12px; background: var(--bg-surface); border: 1px solid var(--border-color); font-size: 0.7rem; font-weight: 700; }
        .blink { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); animation: pulse 2s infinite; }
        .clock { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 700; color: var(--color-accent); background: var(--color-accent-alpha); padding: 2px 10px; border-radius: 4px; }

        .workspace { grid-column: 2; grid-row: 2; background: var(--bg-primary); overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
        .statusbar { grid-column: 2; grid-row: 3; background: var(--bg-secondary); border-top: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 0.7rem; color: var(--text-muted); }
        .status-item { display: flex; align-items: center; gap: 6px; }

        .screen { display: none; flex-direction: column; gap: 16px; }
        .screen.active { display: flex; }

        /* MISSION CENTER */
        .prompt-area textarea { width: 100%; height: 140px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; resize: vertical; }
        .prompt-area textarea:focus { border-color: var(--border-focus); }
        .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn { height: 34px; border-radius: 6px; border: none; display: inline-flex; align-items: center; gap: 6px; padding: 0 14px; font-weight: 600; cursor: pointer; font-size: 0.8rem; transition: 0.15s; }
        .btn-primary { background: var(--color-accent); color: #fff; }
        .btn-primary:hover { background: var(--color-accent-hover); }
        .btn-success { background: var(--color-success); color: #fff; }
        .btn-success:hover { background: #0d9e6e; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .btn-outline:hover { background: var(--color-accent-alpha); border-color: var(--color-accent); }
        .btn-danger { background: var(--color-danger); color: #fff; }
        .btn-danger:hover { background: #d32f2f; }
        .badge { font-size: 0.75rem; padding: 2px 12px; border-radius: 12px; background: var(--bg-surface); border: 1px solid var(--border-color); margin-left: auto; }

        .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-height: 160px; }
        .panel { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; overflow-y: auto; max-height: 200px; }
        .panel-title { font-weight: 600; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; }
        .queue-item { display: flex; justify-content: space-between; padding: 3px 6px; border-bottom: 1px solid var(--border-color); font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }
        .q-status { font-size: 0.6rem; padding: 1px 8px; border-radius: 10px; font-weight: 600; }
        .q-waiting { background: var(--color-warning); color: #000; }
        .q-running { background: var(--color-accent); color: #fff; }
        .q-completed { background: var(--color-success); color: #fff; }
        .q-failed { background: var(--color-danger); color: #fff; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.7rem; }
        .log-success { color: var(--color-success); }
        .log-warning { color: var(--color-warning); }
        .log-error { color: var(--color-danger); }
        .log-info { color: var(--text-secondary); }

        /* FILES */
        .file-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; min-height: 280px; }
        .file-list { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; overflow-y: auto; max-height: 300px; }
        .file-row { padding: 4px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
        .file-row:hover { background: var(--color-accent-alpha); }
        .file-row.active { background: var(--color-accent-alpha); color: var(--color-accent-bright); }
        .file-editor { display: flex; flex-direction: column; gap: 6px; }
        .file-editor textarea { flex: 1; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; resize: vertical; min-height: 200px; }
        .file-actions { display: flex; gap: 6px; flex-wrap: wrap; }

        /* TOAST */
        .toast-container { position: fixed; bottom: 40px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 6px; width: 280px; pointer-events: none; }
        .toast { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px 14px; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 10px; pointer-events: auto; animation: slideUp 0.2s ease; }
        .toast.exit { transform: translateY(-10px); opacity: 0; transition: 0.2s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
        @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; opacity: 0; pointer-events: none; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; transform: scale(0.95); transition: 0.2s; }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-head { padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { padding: 16px; }
        .modal-foot { padding: 10px 16px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); display: flex; justify-content: flex-end; gap: 8px; }
        .modal-input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); }

        @media (max-width: 768px) {
            .shell { grid-template-columns: 1fr; }
            .sidebar { position: fixed; inset: 0; width: 260px !important; transform: translateX(-100%); transition: 0.2s; z-index: 100; }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .topbar { grid-column: 1; }
            .workspace { grid-column: 1; padding: 12px; }
            .statusbar { grid-column: 1; }
            .panels { grid-template-columns: 1fr; }
            .file-grid { grid-template-columns: 1fr; }
            .toast-container { left: 16px; right: 16px; width: auto; }
        }
    </style>
</head>
<body>

<div class="shell" id="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="material-symbols-outlined sidebar-logo">explore</span>
            <span class="sidebar-title">MISSION</span>
        </div>
        <div class="sidebar-repo">
            <select class="repo-select" id="repoSelect"></select>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-link active" data-screen="mission">🚀 Mission</div>
            <div class="nav-link" data-screen="files">📁 Files</div>
        </nav>
        <div class="sidebar-footer">
            <span style="font-size:0.6rem;color:var(--text-muted)">v2.0</span>
            <button class="theme-btn" id="themeToggle">🌓</button>
        </div>
    </aside>

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <span class="system-badge"><span class="blink"></span> ONLINE</span>
            <span id="repoName" style="font-weight:600;font-size:0.85rem;">Default</span>
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <!-- WORKSPACE -->
    <main class="workspace">
        <!-- MISSION SCREEN -->
        <div class="screen active" id="screen-mission">
            <div>
                <h2 style="font-size:1.3rem;">🚀 Mission Center</h2>
                <p style="color:var(--text-secondary);font-size:0.85rem;">Write commands, parse, execute.</p>
            </div>
            <div class="prompt-area">
                <textarea id="promptInput" placeholder="CREATE: hello.txt&#10;Hello World&#10;END"></textarea>
                <div class="actions">
                    <button class="btn btn-primary" id="btnParse">Parse</button>
                    <button class="btn btn-success" id="btnExecute">Execute</button>
                    <button class="btn btn-outline" id="btnClear">Clear</button>
                    <span class="badge" id="statusBadge">Idle</span>
                </div>
            </div>
            <div class="panels">
                <div class="panel">
                    <div class="panel-title">Queue</div>
                    <div id="queueList"><div style="color:var(--text-muted);text-align:center;padding:16px;">Empty</div></div>
                </div>
                <div class="panel">
                    <div class="panel-title">Log</div>
                    <div id="logList"><div style="color:var(--text-muted);text-align:center;padding:16px;">Ready</div></div>
                </div>
            </div>
        </div>

        <!-- FILES SCREEN -->
        <div class="screen" id="screen-files">
            <div>
                <h2 style="font-size:1.3rem;">📁 Files</h2>
                <p style="color:var(--text-secondary);font-size:0.85rem;">Create, edit, delete.</p>
            </div>
            <div class="file-grid">
                <div class="file-list" id="fileTree"><div style="color:var(--text-muted);text-align:center;padding:16px;">No files</div></div>
                <div class="file-editor">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span id="activeFileName" style="font-weight:600;font-size:0.85rem;">Select a file</span>
                        <button class="btn btn-outline" id="btnNewFile" style="padding:0 10px;height:28px;font-size:0.7rem;">+ New</button>
                    </div>
                    <textarea id="fileEditor" placeholder="File content..."></textarea>
                    <div class="file-actions">
                        <button class="btn btn-success" id="btnSaveFile">Save</button>
                        <button class="btn btn-danger" id="btnDeleteFile">Delete</button>
                        <button class="btn btn-outline" id="btnRenameFile">Rename</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- STATUSBAR -->
    <footer class="statusbar">
        <div class="status-item"><span class="status-dot" style="width:6px;height:6px;border-radius:50%;background:var(--color-success);display:inline-block;"></span><span id="statusInfo">Ready</span></div>
        <div id="statusAction">System online</div>
    </footer>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastDock"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-head">
            <h3 id="modalTitle">Action</h3>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot">
            <button class="btn btn-outline" id="modalCancel">Cancel</button>
            <button class="btn btn-primary" id="modalConfirm">Confirm</button>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- CLASSIC SCRIPT — Works on Samsung, no modules -->
<!-- ============================================================ -->
<script>
(function() {
    'use strict';

    // --- STORAGE ---
    var storage = {
        get: function(k, d) { d = (d === undefined ? null : d); try { var v = localStorage.getItem('mr_' + k); return v ? JSON.parse(v) : d; } catch(e) { return d; } },
        set: function(k, v) { localStorage.setItem('mr_' + k, JSON.stringify(v)); },
        clear: function() { var keys = []; for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k && k.indexOf('mr_') === 0) keys.push(k); } keys.forEach(function(k) { localStorage.removeItem(k); }); }
    };

    // --- STATE ---
    var defaultFiles = [
        { path: 'README.md', content: '# Mission Runner\n\nWrite commands in Mission Center.' },
        { path: 'src/index.js', content: 'console.log("Hello from Mission Runner");' }
    ];
    var state = {
        files: storage.get('files', defaultFiles),
        activePath: storage.get('activePath', defaultFiles[0] ? defaultFiles[0].path : ''),
        queue: [],
        status: 'idle',
        repositories: storage.get('repositories', [{ id: 'default', name: 'Default', files: defaultFiles }]),
        currentRepo: storage.get('currentRepo', 'default')
    };

    function saveState() {
        storage.set('repositories', state.repositories);
        storage.set('currentRepo', state.currentRepo);
        storage.set('activePath', state.activePath);
        // Sync files from current repo
        var repo = getCurrentRepo();
        if (repo) { state.files = repo.files; storage.set('files', repo.files); }
    }

    function getCurrentRepo() {
        for (var i = 0; i < state.repositories.length; i++) {
            if (state.repositories[i].id === state.currentRepo) return state.repositories[i];
        }
        return state.repositories[0];
    }

    function getFile(path) {
        for (var i = 0; i < state.files.length; i++) {
            if (state.files[i].path === path) return state.files[i];
        }
        return null;
    }
    function getActiveFile() { return getFile(state.activePath); }

    // Sync files from current repo
    function syncFiles() {
        var repo = getCurrentRepo();
        if (repo) { state.files = repo.files; }
        saveState();
    }
    syncFiles();

    // --- NOTIFICATIONS ---
    function toast(msg, type) {
        type = type || 'info';
        var dock = document.getElementById('toastDock');
        if (!dock) return;
        var el = document.createElement('div');
        el.className = 'toast';
        var icons = { success:'✅', warning:'⚠️', error:'❌', info:'ℹ️' };
        el.innerHTML = '<span>' + (icons[type] || 'ℹ️') + '</span><span>' + msg + '</span>';
        dock.appendChild(el);
        setTimeout(function() { el.classList.add('exit'); }, 3000);
        setTimeout(function() { el.remove(); }, 3500);
    }

    // --- MODAL ---
    function showModal(title, bodyHTML, onConfirm) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = bodyHTML;
        document.getElementById('modalOverlay').classList.add('active');
        var confirmBtn = document.getElementById('modalConfirm');
        var newConfirm = confirmBtn.cloneNode(true);
        confirmBtn.parentNode.replaceChild(newConfirm, confirmBtn);
        newConfirm.addEventListener('click', function() {
            closeModal();
            if (onConfirm) onConfirm();
        });
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === e.currentTarget) closeModal();
    });

    // --- THEME ---
    function setTheme(t) {
        var root = document.documentElement;
        if (t === 'light') { root.classList.add('theme-light'); } else { root.classList.remove('theme-light'); }
        storage.set('theme', t);
    }
    var savedTheme = storage.get('theme', 'dark');
    setTheme(savedTheme);
    document.getElementById('themeToggle').addEventListener('click', function() {
        var isLight = document.documentElement.classList.contains('theme-light');
        setTheme(isLight ? 'dark' : 'light');
    });

    // --- CLOCK ---
    function updateClock() {
        var now = new Date();
        document.getElementById('clock').textContent = now.toISOString().replace('T', ' ').slice(0, 19);
    }
    updateClock();
    setInterval(updateClock, 1000);

    // --- NAVIGATION ---
    var navLinks = document.querySelectorAll('.nav-link');
    for (var i = 0; i < navLinks.length; i++) {
        navLinks[i].addEventListener('click', function() {
            var links = document.querySelectorAll('.nav-link');
            for (var j = 0; j < links.length; j++) links[j].classList.remove('active');
            this.classList.add('active');
            var screens = document.querySelectorAll('.screen');
            for (var k = 0; k < screens.length; k++) screens[k].classList.remove('active');
            var target = document.getElementById('screen-' + this.dataset.screen);
            if (target) target.classList.add('active');
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        });
    }

    // Mobile toggle
    document.getElementById('menuToggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('open');
    });

    // --- REPO SELECT ---
    function renderRepoSelect() {
        var sel = document.getElementById('repoSelect');
        sel.innerHTML = '';
        for (var i = 0; i < state.repositories.length; i++) {
            var opt = document.createElement('option');
            opt.value = state.repositories[i].id;
            opt.textContent = state.repositories[i].name;
            if (state.repositories[i].id === state.currentRepo) opt.selected = true;
            sel.appendChild(opt);
        }
        // Add option to create new
        var createOpt = document.createElement('option');
        createOpt.value = '__new__';
        createOpt.textContent = '+ New Repository';
        sel.appendChild(createOpt);
        sel.addEventListener('change', function() {
            if (this.value === '__new__') {
                showModal('New Repository', '<input type="text" id="newRepoName" class="modal-input" placeholder="Repository name">', function() {
                    var name = document.getElementById('newRepoName').value.trim();
                    if (!name) { toast('Enter a name', 'warning'); return; }
                    var id = 'repo_' + Date.now();
                    state.repositories.push({ id: id, name: name, files: [{ path: 'README.md', content: '# ' + name + '\n\nNew repository.' }] });
                    state.currentRepo = id;
                    saveState();
                    syncFiles();
                    renderRepoSelect();
                    renderAll();
                    toast('Created "' + name + '"', 'success');
                });
                this.value = state.currentRepo;
                return;
            }
            state.currentRepo = this.value;
            saveState();
            syncFiles();
            renderAll();
        });
        document.getElementById('repoName').textContent = getCurrentRepo() ? getCurrentRepo().name : 'Default';
    }

    // --- FILE SYSTEM ---
    function createFile(path, content) {
        content = content || '';
        if (getFile(path)) { toast('File exists', 'warning'); return false; }
        state.files.push({ path: path, content: content });
        // Also update repo
        var repo = getCurrentRepo();
        if (repo) { repo.files = state.files; }
        saveState();
        renderFiles();
        return true;
    }
    function writeFile(path, content) {
        var f = getFile(path);
        if (!f) { toast('File not found', 'error'); return false; }
        f.content = content;
        var repo = getCurrentRepo();
        if (repo) { repo.files = state.files; }
        saveState();
        return true;
    }
    function deleteFile(path) {
        var newFiles = [];
        for (var i = 0; i < state.files.length; i++) {
            if (state.files[i].path !== path) newFiles.push(state.files[i]);
        }
        state.files = newFiles;
        if (state.activePath === path) { state.activePath = state.files.length > 0 ? state.files[0].path : ''; }
        var repo = getCurrentRepo();
        if (repo) { repo.files = state.files; }
        saveState();
        renderFiles();
        renderEditor();
        return true;
    }
    function renameFile(oldPath, newPath) {
        var f = getFile(oldPath);
        if (!f) { toast('File not found', 'error'); return false; }
        if (getFile(newPath)) { toast('Target exists', 'warning'); return false; }
        f.path = newPath;
        if (state.activePath === oldPath) state.activePath = newPath;
        var repo = getCurrentRepo();
        if (repo) { repo.files = state.files; }
        saveState();
        renderFiles();
        renderEditor();
        return true;
    }

    // --- COMMAND PARSER ---
    function parseCommands(text) {
        var lines = text.split('\n');
        var ops = [];
        var current = null;
        var mode = null;

        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;

            // Single-line commands
            var match = line.match(/^(CREATE|EDIT|DELETE|RENAME|COMMIT|WAIT|COMMENT):\s*(.*)/);
            if (match) {
                if (current) { ops.push(current); current = null; mode = null; }
                var cmd = match[1];
                var arg = match[2];
                var op = { command: cmd, args: {}, line: i+1 };
                if (cmd === 'CREATE' || cmd === 'EDIT') op.args.path = arg;
                else if (cmd === 'DELETE') op.args.path = arg;
                else if (cmd === 'RENAME') {
                    var parts = arg.split('->').map(function(p) { return p.trim(); });
                    op.args.from = parts[0] || '';
                    op.args.to = parts[1] || '';
                }
                else if (cmd === 'COMMIT') op.args.message = arg;
                else if (cmd === 'WAIT') op.args.delay = parseInt(arg) || 1000;
                else if (cmd === 'COMMENT') op.args.message = arg;
                ops.push(op);
                continue;
            }

            // Multi-line: CREATE/EDIT with content
            if (line === 'END') {
                if (current) { ops.push(current); current = null; mode = null; }
                continue;
            }
            if (line.indexOf('CREATE:') === 0 || line.indexOf('EDIT:') === 0) {
                if (current) ops.push(current);
                var isCreate = line.indexOf('CREATE:') === 0;
                var cmdName = isCreate ? 'CREATE' : 'EDIT';
                var path = line.replace(/^(CREATE|EDIT):\s*/, '').trim();
                current = { command: cmdName, args: { path: path, content: [] }, line: i+1 };
                mode = 'content';
                continue;
            }
            if (mode === 'content' && current) {
                current.args.content.push(line);
            }

            // REPLACE with TARGET/REPLACEMENT
            if (line.indexOf('REPLACE:') === 0) {
                if (current) ops.push(current);
                var rpath = line.replace('REPLACE:', '').trim();
                current = { command: 'REPLACE', args: { path: rpath, target: [], replacement: [] }, line: i+1 };
                mode = 'replace_target';
                continue;
            }
            if (mode === 'replace_target' && line === 'REPLACEMENT:') {
                mode = 'replace_replacement';
                continue;
            }
            if (mode === 'replace_target' && current) {
                current.args.target.push(line);
            }
            if (mode === 'replace_replacement' && current) {
                current.args.replacement.push(line);
            }
        }

        // Post-process
        for (var j = 0; j < ops.length; j++) {
            var op = ops[j];
            if (op.command === 'CREATE' || op.command === 'EDIT') {
                if (op.args.content && Array.isArray(op.args.content)) {
                    op.args.content = op.args.content.join('\n');
                }
            }
            if (op.command === 'REPLACE') {
                if (op.args.target && Array.isArray(op.args.target)) {
                    op.args.target = op.args.target.join('\n');
                }
                if (op.args.replacement && Array.isArray(op.args.replacement)) {
                    op.args.replacement = op.args.replacement.join('\n');
                }
            }
        }

        return ops;
    }

    // --- EXECUTOR ---
    function executeOp(op) {
        switch (op.command) {
            case 'CREATE':
            case 'EDIT':
                return createFile(op.args.path, op.args.content || '');
            case 'DELETE':
                return deleteFile(op.args.path);
            case 'RENAME':
                return renameFile(op.args.from, op.args.to);
            case 'REPLACE': {
                var rf = getFile(op.args.path);
                if (!rf) { toast('File not found: ' + op.args.path, 'error'); return false; }
                if (rf.content.indexOf(op.args.target) === -1) {
                    toast('Target not found in ' + op.args.path, 'warning');
                    return false;
                }
                rf.content = rf.content.replace(op.args.target, op.args.replacement);
                var repo = getCurrentRepo();
                if (repo) { repo.files = state.files; }
                saveState();
                renderFiles();
                renderEditor();
                return true;
            }
            case 'COMMIT':
                toast('Committed: ' + (op.args.message || 'update'), 'success');
                return true;
            case 'WAIT': {
                var delay = op.args.delay || 1000;
                var start = Date.now();
                while (Date.now() - start < delay) { /* busy wait */ }
                return true;
            }
            case 'COMMENT':
                return true;
            default:
                toast('Unknown command: ' + op.command, 'warning');
                return false;
        }
    }

    // --- UI RENDERING ---
    function renderFiles() {
        var container = document.getElementById('fileTree');
        if (!state.files.length) {
            container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:16px;">No files</div>';
            return;
        }
        var html = '';
        for (var i = 0; i < state.files.length; i++) {
            var f = state.files[i];
            var active = f.path === state.activePath ? 'active' : '';
            html += '<div class="file-row ' + active + '" data-path="' + f.path + '">';
            html += '<span class="material-symbols-outlined" style="font-size:16px;">description</span>';
            html += '<span>' + f.path + '</span>';
            html += '</div>';
        }
        container.innerHTML = html;
        var rows = container.querySelectorAll('.file-row');
        for (var j = 0; j < rows.length; j++) {
            rows[j].addEventListener('click', function() {
                state.activePath = this.dataset.path;
                saveState();
                renderFiles();
                renderEditor();
            });
        }
        renderEditor();
    }

    function renderEditor() {
        var f = getActiveFile();
        var ta = document.getElementById('fileEditor');
        var label = document.getElementById('activeFileName');
        if (!f) {
            ta.value = '';
            ta.disabled = true;
            label.textContent = 'No file selected';
            return;
        }
        ta.value = f.content;
        ta.disabled = false;
        label.textContent = f.path;
    }

    function renderQueue() {
        var container = document.getElementById('queueList');
        if (!state.queue.length) {
            container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:16px;">Empty</div>';
            return;
        }
        var html = '';
        for (var i = 0; i < state.queue.length; i++) {
            var op = state.queue[i];
            var status = op.status || 'waiting';
            html += '<div class="queue-item">';
            html += '<span>#' + (i+1) + ' ' + op.command + ' ' + (op.args.path || op.args.name || '');
            html += '</span><span class="q-status q-' + status + '">' + status + '</span>';
            html += '</div>';
        }
        container.innerHTML = html;
    }

    function addLog(msg, type) {
        type = type || 'info';
        var container = document.getElementById('logList');
        var empty = container.querySelector('.empty-state');
        if (empty) container.innerHTML = '';
        var el = document.createElement('div');
        el.className = 'log-entry log-' + type;
        var now = new Date();
        var time = now.toLocaleTimeString();
        el.textContent = '[' + time + '] ' + msg;
        container.appendChild(el);
        container.scrollTop = container.scrollHeight;
    }

    function setStatus(text) {
        document.getElementById('statusBadge').textContent = text;
        document.getElementById('statusInfo').textContent = text;
        state.status = text;
    }

    function renderAll() {
        renderFiles();
        renderQueue();
        renderRepoSelect();
        var repo = getCurrentRepo();
        document.getElementById('repoName').textContent = repo ? repo.name : 'Default';
        var statusInfo = document.getElementById('statusInfo');
        if (statusInfo) statusInfo.textContent = 'Ready — ' + (repo ? repo.name : 'Default');
    }

    // --- MISSION ENGINE ---
    var running = false;

    function runMission() {
        if (running) { toast('Already running', 'warning'); return; }
        if (!state.queue.length) { toast('Queue empty. Parse first.', 'warning'); return; }

        running = true;
        setStatus('Running');

        var index = 0;
        var total = state.queue.length;

        function nextStep() {
            if (index >= total) {
                setStatus('Done');
                toast('Mission complete', 'success');
                running = false;
                renderQueue();
                return;
            }

            var op = state.queue[index];
            op.status = 'running';
            renderQueue();
            addLog('▶ ' + op.command + ' ' + (op.args.path || ''), 'info');

            try {
                var ok = executeOp(op);
                if (ok) {
                    op.status = 'completed';
                    addLog('✓ ' + op.command + ' success', 'success');
                } else {
                    op.status = 'failed';
                    addLog('✗ ' + op.command + ' failed', 'error');
                    setStatus('Error');
                    running = false;
                    renderQueue();
                    return;
                }
            } catch (e) {
                op.status = 'failed';
                addLog('✗ ' + op.command + ' error: ' + e.message, 'error');
                setStatus('Error');
                running = false;
                renderQueue();
                return;
            }

            index++;
            renderQueue();
            setTimeout(nextStep, 50);
        }

        nextStep();
    }

    // --- ZIP ---
    function importZip(file) {
        if (typeof JSZip === 'undefined') { toast('JSZip not loaded', 'error'); return; }
        var zip = new JSZip();
        zip.loadAsync(file).then(function(contents) {
            var files = [];
            var promises = [];
            contents.forEach(function(relativePath, zipEntry) {
                if (!zipEntry.dir) {
                    var promise = zipEntry.async('string').then(function(content) {
                        files.push({ path: relativePath, content: content });
                    });
                    promises.push(promise);
                }
            });
            return Promise.all(promises).then(function() {
                var repo = getCurrentRepo();
                if (!repo) { toast('No repository', 'error'); return; }
                for (var i = 0; i < files.length; i++) {
                    var f = files[i];
                    var existing = getFile(f.path);
                    if (existing) { existing.content = f.content; } else { state.files.push(f); }
                }
                repo.files = state.files;
                saveState();
                renderFiles();
                toast('Imported ' + files.length + ' files', 'success');
            });
        }).catch(function(err) {
            toast('Failed to import ZIP', 'error');
        });
    }

    function exportZip() {
        if (typeof JSZip === 'undefined') { toast('JSZip not loaded', 'error'); return; }
        var zip = new JSZip();
        for (var i = 0; i < state.files.length; i++) {
            zip.file(state.files[i].path, state.files[i].content);
        }
        zip.generateAsync({ type: 'blob' }).then(function(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            var repo = getCurrentRepo();
            a.download = (repo ? repo.name : 'workspace') + '_export.zip';
            a.click();
            URL.revokeObjectURL(url);
            toast('Export started', 'success');
        });
    }

    // --- EVENT BINDINGS ---
    document.getElementById('btnParse').addEventListener('click', function() {
        var text = document.getElementById('promptInput').value;
        if (!text.trim()) { toast('Enter commands', 'warning'); return; }
        var ops = parseCommands(text);
        for (var i = 0; i < ops.length; i++) { ops[i].status = 'waiting'; }
        state.queue = ops;
        renderQueue();
        addLog('Parsed ' + ops.length + ' commands', 'info');
        setStatus(ops.length ? 'Parsed' : 'Idle');
        if (ops.length) toast('Parsed ' + ops.length + ' commands', 'success');
    });

    document.getElementById('btnExecute').addEventListener('click', runMission);

    document.getElementById('btnClear').addEventListener('click', function() {
        document.getElementById('promptInput').value = '';
        state.queue = [];
        renderQueue();
        setStatus('Idle');
        addLog('Cleared', 'info');
    });

    document.getElementById('btnSaveFile').addEventListener('click', function() {
        var f = getActiveFile();
        if (!f) { toast('No file open', 'warning'); return; }
        var content = document.getElementById('fileEditor').value;
        f.content = content;
        var repo = getCurrentRepo();
        if (repo) { repo.files = state.files; }
        saveState();
        toast('Saved', 'success');
    });

    document.getElementById('btnDeleteFile').addEventListener('click', function() {
        var f = getActiveFile();
        if (!f) { toast('No file open', 'warning'); return; }
        showModal('Delete File', '<p>Delete <strong>' + f.path + '</strong>?</p>', function() {
            deleteFile(f.path);
            toast('Deleted', 'success');
        });
    });

    document.getElementById('btnRenameFile').addEventListener('click', function() {
        var f = getActiveFile();
        if (!f) { toast('No file open', 'warning'); return; }
        showModal('Rename File',
            '<input type="text" id="renameInput" class="modal-input" value="' + f.path + '">',
            function() {
                var newPath = document.getElementById('renameInput').value.trim();
                if (!newPath) { toast('Enter a path', 'warning'); return; }
                renameFile(f.path, newPath);
                toast('Renamed', 'success');
            }
        );
    });

    document.getElementById('btnNewFile').addEventListener('click', function() {
        showModal('New File',
            '<input type="text" id="newFileInput" class="modal-input" placeholder="path/to/file.js">',
            function() {
                var path = document.getElementById('newFileInput').value.trim();
                if (!path) { toast('Enter a path', 'warning'); return; }
                if (createFile(path, '')) {
                    state.activePath = path;
                    saveState();
                    renderFiles();
                    renderEditor();
                    toast('Created ' + path, 'success');
                }
            }
        );
    });

    // Import/Export ZIP via buttons in mission screen
    var importBtn = document.createElement('button');
    importBtn.className = 'btn btn-outline';
    importBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">upload</span> Import ZIP';
    importBtn.addEventListener('click', function() {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = '.zip';
        input.onchange = function(e) {
            if (e.target.files[0]) importZip(e.target.files[0]);
            input.remove();
        };
        input.click();
    });
    document.querySelector('.actions').appendChild(importBtn);

    var exportBtn = document.createElement('button');
    exportBtn.className = 'btn btn-outline';
    exportBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">download</span> Export ZIP';
    exportBtn.addEventListener('click', exportZip);
    document.querySelector('.actions').appendChild(exportBtn);

    // Keyboard: Ctrl+S
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            var f = getActiveFile();
            if (f && document.activeElement && document.activeElement.id === 'fileEditor') {
                e.preventDefault();
                document.getElementById('btnSaveFile').click();
            }
        }
    });

    // --- BOOT ---
    function boot() {
        renderAll();
        addLog('System ready', 'info');
        document.getElementById('promptInput').value = 'CREATE: hello.txt\nHello from Mission Runner\n\nCREATE: notes.md\n# Notes\n- First item\n\nEND';
        toast('Mission Runner ready', 'success');
    }

    boot();

    // Expose for debugging
    window.__state = state;
})();
</script>

</body>
